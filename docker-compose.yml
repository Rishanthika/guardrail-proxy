services:
  guardrail-proxy:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Override anything from config/settings.py here. Examples:
      # DRY_RUN_OVERRIDE: "true"
      DATABASE_URL: "sqlite+aiosqlite:////app/data/guardrail.db"
      LOG_LEVEL: "INFO"
    volumes:
      - guardrail-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  guardrail-data:
